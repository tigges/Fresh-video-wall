<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DJ UrbanT | More Videos</title>
    <meta
      name="description"
      content="More DJ UrbanT video performances from YouTube."
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-page="videos">
    <header class="site-header">
      <a class="brand" href="./index.html" aria-label="Back to home">
        <img
          class="brand-logo"
          src="./assets/images/djurbant-logo.svg"
          alt="DJ UrbanT"
        />
      </a>
      <nav class="social-links" aria-label="Navigation">
        <a class="pill" href="./index.html">Home</a>
        <a
          class="pill pill-youtube"
          href="https://m.youtube.com/@dj_urbant"
          target="_blank"
          rel="noopener noreferrer"
          >YouTube</a
        >
      </nav>
    </header>

    <main class="subpage-main">
      <section class="media-section">
        <div class="section-head">
          <h1>More Videos</h1>
          <a
            class="btn btn-outline"
            href="https://m.youtube.com/@dj_urbant"
            target="_blank"
            rel="noopener noreferrer"
            >Open Channel</a
          >
        </div>
        <p class="subpage-intro">
          Ranked from fetched channel stats. These are the videos beyond the
          homepage Top 3.
        </p>

        <div id="videos-rest-grid" class="subpage-grid"></div>
        <div class="section-cta subpage-end-cta">
          <a
            class="btn btn-subscribe"
            href="https://m.youtube.com/@dj_urbant"
            target="_blank"
            rel="noopener noreferrer"
            >Subscribe</a
          >
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <p>DJ UrbanT &copy; <span id="year"></span>.</p>
    </footer>

    <script src="./script.js"></script>
  </body>
</html>
