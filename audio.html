<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DJ UrbanT | More Audio</title>
    <meta
      name="description"
      content="Mixcloud-style audio feed for DJ UrbanT, with embedded playback."
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-page="audio-mixcloud">
    <header class="site-header">
      <a class="brand" href="./index.html" aria-label="Back to home">
        <img
          class="brand-logo"
          src="./assets/images/djurbant-logo.svg"
          alt="DJ UrbanT"
        />
      </a>
      <nav class="social-links" aria-label="Navigation">
        <a class="btn btn-outline" href="./index.html">Home</a>
      </nav>
    </header>

    <main class="subpage-main">
      <section class="mixcloud-profile">
        <p class="mixcloud-profile-kicker">Mixcloud Profile</p>
        <h1>@urbant</h1>
        <p>
          Mixcloud-style feed view with embedded playback iframes, framed on this
          landing page.
        </p>
        <div class="mixcloud-profile-actions">
          <a
            class="btn btn-outline"
            href="https://www.mixcloud.com/urbant/"
            target="_blank"
            rel="noopener noreferrer"
            >Open Mixcloud</a
          >
        </div>
      </section>

      <section class="media-section">
        <div class="section-head">
          <h2>More Audio</h2>
        </div>
        <p class="subpage-intro">
          Embedded Mixcloud players from DJ UrbanT sets, including Top 3 and the
          remaining ranked mixes.
        </p>
        <div id="audio-mixcloud-list" class="mixcloud-feed"></div>
      </section>
    </main>

    <footer class="site-footer">
      <p>DJ UrbanT &copy; <span id="year"></span>.</p>
    </footer>

    <script src="./script.js"></script>
  </body>
</html>
