name: Refresh Media Data

on:
  schedule:
    # Every 6 hours (UTC) - balanced freshness vs API/load
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-media-data
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Keep previous media-data snapshot
        run: |
          if [ -f media-data.json ]; then
            cp media-data.json .media-data.previous.json
          fi

      - name: Rebuild ranked media data
        run: python3 scripts/sync_media_data.py

      - name: Detect meaningful media changes
        id: detect
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          old_path = Path(".media-data.previous.json")
          new_path = Path("media-data.json")
          changed = True

          if old_path.exists() and new_path.exists():
            old_data = json.loads(old_path.read_text(encoding="utf-8"))
            new_data = json.loads(new_path.read_text(encoding="utf-8"))
            old_data.pop("generatedAt", None)
            new_data.pop("generatedAt", None)
            changed = old_data != new_data

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
            output.write(f"changed={'true' if changed else 'false'}\n")
          PY

      - name: Commit and push refresh
        if: steps.detect.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add media-data.json
          git commit -m "chore(media): refresh ranked media wall data"
          git push origin HEAD:main
