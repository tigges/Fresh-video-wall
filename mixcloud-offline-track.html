<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DJ UrbanT | MixCloud Offline Track</title>
    <meta
      name="description"
      content="Offline-style MixCloud track detail page for DJ UrbanT with playback UI and comments."
    />
    <link rel="stylesheet" href="./mixcloud-offline.css" />
  </head>
  <body data-page="mixcloud-offline-track">
    <header class="site-header offline-nav">
      <div class="offline-nav-left">
        <a class="offline-wordmark" href="./mixcloud-offline.html" aria-label="MixCloud Offline Home">
          MIXCLOUD
        </a>
      </div>
      <nav class="offline-nav-right" aria-label="Navigation">
        <a class="offline-nav-link" href="./mixcloud-offline.html">Back to Cloudcasts</a>
        <a class="offline-nav-link" href="./audio.html">Mixcloud Audio</a>
      </nav>
    </header>

    <main class="subpage-main">
      <section class="offline-track-hero">
        <p class="mixcloud-profile-kicker">Cloudcast Detail (Offline)</p>
        <h1 id="offline-track-title">DJ UrbanT Live! Set</h1>
        <p id="offline-track-meta">plays • date</p>
      </section>

      <section class="offline-track-player-shell">
        <div class="offline-track-cover">
          <img
            class="offline-track-cover-logo"
            src="./assets/images/djurbant-logo.svg"
            alt=""
            aria-hidden="true"
          />
          <span id="offline-track-set" class="offline-track-cover-set">#000</span>
        </div>
        <div class="offline-track-controls-row">
          <button class="offline-icon-btn" data-offline-action="prev" aria-label="Previous">⏮</button>
          <button class="offline-icon-btn" data-offline-action="rewind" aria-label="Rewind 30 seconds">⟲30</button>
          <button
            id="offline-track-toggle"
            class="offline-icon-btn is-primary"
            data-offline-action="toggle"
            aria-label="Play"
          >
            ▶
          </button>
          <button class="offline-icon-btn" data-offline-action="forward" aria-label="Forward 30 seconds">30⟳</button>
          <button class="offline-icon-btn" data-offline-action="next" aria-label="Next">⏭</button>
        </div>
        <div class="offline-track-progress-wrap">
          <span id="offline-track-current" class="offline-track-time">00:00</span>
          <input
            id="offline-track-progress"
            class="offline-track-progress-input"
            type="range"
            min="0"
            max="1000"
            value="0"
            aria-label="Playback progress"
          />
          <span id="offline-track-duration" class="offline-track-time">00:00</span>
        </div>
        <div class="offline-track-info-row" aria-hidden="true">
          <span id="offline-track-status">Offline playback simulation</span>
          <span>comments + related preserved locally</span>
        </div>
        <audio id="offline-track-audio" preload="metadata"></audio>
      </section>

      <section class="media-section">
        <div class="section-head">
          <h2>Comments</h2>
        </div>
        <ul id="offline-track-comments" class="offline-comments-list"></ul>
      </section>

      <section class="media-section">
        <div class="section-head">
          <h2>Related Cloudcasts</h2>
        </div>
        <div id="offline-track-related" class="offline-related-list"></div>
      </section>
    </main>

    <footer class="site-footer">
      <p>DJ UrbanT &copy; <span id="year"></span>.</p>
    </footer>
    <nav class="offline-mobile-nav is-single" aria-label="Offline mobile navigation">
      <a href="./audio.html">Back</a>
    </nav>

    <script src="./script.js"></script>
  </body>
</html>
