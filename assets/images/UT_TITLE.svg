<svg xmlns="http://www.w3.org/2000/svg" width="920" height="180" viewBox="0 0 920 180" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">DJ UrbanT title logo</title>
  <desc id="desc">Triangular chromatic UT icon followed by white DJ UrbanT wordmark.</desc>
  <defs>
    <linearGradient id="playBase" x1="10" y1="10" x2="210" y2="170" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#A7FF47"/>
