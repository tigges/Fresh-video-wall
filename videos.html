<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DJ UrbanT | More Videos</title>
    <meta
      name="description"
      content="More DJ UrbanT video performances from YouTube."
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="./index.html" aria-label="Back to home">
        <img
          class="brand-logo"
          src="./assets/images/djurbant-logo.svg"
          alt="DJ UrbanT"
        />
      </a>
      <nav class="social-links" aria-label="Navigation">
        <a class="pill" href="./index.html">Home</a>
        <a
          class="pill pill-youtube"
          href="https://m.youtube.com/@dj_urbant"
          target="_blank"
          rel="noopener noreferrer"
          >YouTube</a
        >
      </nav>
    </header>

    <main class="subpage-main">
      <section class="media-section">
        <div class="section-head">
          <h1>More Videos</h1>
          <a
            class="btn btn-outline"
            href="https://m.youtube.com/@dj_urbant"
            target="_blank"
            rel="noopener noreferrer"
            >Open Channel</a
          >
        </div>
        <p class="subpage-intro">
          Additional performances beyond the homepage top picks, pulled from DJ
          UrbanT live streams on YouTube.
        </p>

        <div class="subpage-grid">
          <article class="media-card">
            <div class="embed-wrap">
              <iframe
                src="https://www.youtube.com/embed/uFJzPmG7zS8"
                title="Set 434 - Bass House - DJ UrbanT"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                referrerpolicy="strict-origin-when-cross-origin"
                allowfullscreen
              ></iframe>
            </div>
            <div class="media-meta">
              <h3>Set #434 - Bass House</h3>
              <a
                href="https://www.youtube.com/watch?v=uFJzPmG7zS8"
                target="_blank"
                rel="noopener noreferrer"
                >Watch on YouTube</a
              >
            </div>
          </article>

          <article class="media-card">
            <div class="embed-wrap">
              <iframe
                src="https://www.youtube.com/embed/odAzUGdV_so"
                title="Set 429 - Bass House - DJ UrbanT"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                referrerpolicy="strict-origin-when-cross-origin"
                allowfullscreen
              ></iframe>
            </div>
            <div class="media-meta">
              <h3>Set #429 - Bass House</h3>
              <a
                href="https://www.youtube.com/watch?v=odAzUGdV_so"
                target="_blank"
                rel="noopener noreferrer"
                >Watch on YouTube</a
              >
            </div>
          </article>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <p>DJ UrbanT &copy; <span id="year"></span>.</p>
    </footer>

    <script src="./script.js"></script>
  </body>
</html>
