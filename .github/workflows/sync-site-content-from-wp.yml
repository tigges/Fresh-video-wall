name: Sync Site Content from WordPress

on:
  schedule:
    # Every 30 minutes (UTC) for near-real-time content updates.
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-site-content-from-wp
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Resolve headless CMS configuration
        id: config
        env:
          BASE_URL_SECRET: ${{ secrets.WP_HEADLESS_BASE_URL }}
          BASE_URL_VAR: ${{ vars.WP_HEADLESS_BASE_URL }}
          CONTENT_PATH_SECRET: ${{ secrets.WP_HEADLESS_CONTENT_PATH }}
          CONTENT_PATH_VAR: ${{ vars.WP_HEADLESS_CONTENT_PATH }}
          AUTH_TOKEN_SECRET: ${{ secrets.WP_HEADLESS_AUTH_TOKEN }}
        run: |
          set -euo pipefail
          BASE_URL="${BASE_URL_SECRET:-}"
          if [ -z "$BASE_URL" ]; then
            BASE_URL="${BASE_URL_VAR:-}"
          fi

          CONTENT_PATH="${CONTENT_PATH_SECRET:-}"
          if [ -z "$CONTENT_PATH" ]; then
            CONTENT_PATH="${CONTENT_PATH_VAR:-}"
          fi
          if [ -z "$CONTENT_PATH" ]; then
            CONTENT_PATH="/wp-json/djurbant/v1/site-content"
          fi

          if [ -z "$BASE_URL" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "WP_HEADLESS_BASE_URL is not configured. Skipping sync."
            exit 0
          fi

          echo "enabled=true" >> "$GITHUB_OUTPUT"
          echo "base_url=$BASE_URL" >> "$GITHUB_OUTPUT"
          echo "content_path=$CONTENT_PATH" >> "$GITHUB_OUTPUT"
          if [ -n "${AUTH_TOKEN_SECRET:-}" ]; then
            echo "auth_configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "auth_configured=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Keep previous content snapshot
        if: steps.config.outputs.enabled == 'true'
        run: |
          if [ -f site-content.json ]; then
            cp site-content.json .site-content.previous.json
          fi

      - name: Sync site content from WordPress
        if: steps.config.outputs.enabled == 'true'
        env:
          WP_HEADLESS_BASE_URL: ${{ steps.config.outputs.base_url }}
          WP_HEADLESS_CONTENT_PATH: ${{ steps.config.outputs.content_path }}
          WP_HEADLESS_AUTH_TOKEN: ${{ secrets.WP_HEADLESS_AUTH_TOKEN }}
        run: |
          python3 scripts/sync_site_content_from_wp.py

      - name: Detect meaningful content changes
        if: steps.config.outputs.enabled == 'true'
        id: detect
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          old_path = Path(".site-content.previous.json")
          new_path = Path("site-content.json")
          changed = True

          if old_path.exists() and new_path.exists():
            old_data = json.loads(old_path.read_text(encoding="utf-8"))
            new_data = json.loads(new_path.read_text(encoding="utf-8"))
            changed = old_data != new_data

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
            output.write(f"changed={'true' if changed else 'false'}\n")
          PY

      - name: Commit and push content sync
        if: steps.config.outputs.enabled == 'true' && steps.detect.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add site-content.json
          git commit -m "chore(content): sync site content from WordPress headless"
          git push origin HEAD:main
