<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 340" role="img" aria-labelledby="title desc">
  <title id="title">DJ UrbanT primary logo</title>
  <desc id="desc">Rainbow play icon with UT and DJ UrbanT wordmark.</desc>
  <defs>
    <linearGradient id="triGradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4b1fff" />
      <stop offset="20%" stop-color="#007bff" />
      <stop offset="40%" stop-color="#00b84d" />
      <stop offset="58%" stop-color="#ccff00" />
      <stop offset="76%" stop-color="#ffae00" />
      <stop offset="100%" stop-color="#ff0048" />
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <polygon
    points="72,42 360,170 72,298"
    fill="url(#triGradient)"
    filter="url(#softGlow)"
    opacity="0.98"
  />

  <g opacity="0.35">
    <polygon points="72,42 210,104 118,160" fill="#ffffff" />
    <polygon points="215,105 322,152 230,205" fill="#ffffff" />
    <polygon points="100,188 206,236 120,286" fill="#ffffff" />
  </g>

  <text
    x="124"
    y="218"
    font-size="130"
    font-weight="900"
    font-family="Syne, Montserrat, Arial, sans-serif"
    fill="#050505"
  >
    UT
  </text>

  <text
    x="430"
    y="202"
    font-size="98"
    font-weight="800"
    font-family="Syne, Montserrat, Arial, sans-serif"
    letter-spacing="-1.2"
    fill="#ffffff"
  >
    DJ UrbanT
  </text>
</svg>
